<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Shuv — Skeleton + Board Test</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.19.2/dist/ort.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#000;overflow:hidden;font-family:system-ui,sans-serif;-webkit-tap-highlight-color:transparent}
  #wrap{position:fixed;inset:0}
  video,canvas{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .mirror{transform:scaleX(-1)}
  .chip{background:rgba(0,0,0,.55);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.18)}
  .rbtn{background:rgba(0,0,0,.5);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.22)}
  .rbtn.active{background:#c6ff00;color:#000;border-color:#c6ff00}
</style>
</head>
<body>
<div id="wrap">
  <video id="cam" playsinline muted></video>
  <canvas id="overlay"></canvas>
  <div class="absolute top-0 left-0 right-0 p-4 flex justify-between items-start z-20">
    <div class="chip rounded-full px-3 py-2 text-white text-sm font-bold flex items-center gap-2">
      <span class="w-2.5 h-2.5 rounded-full bg-[#ff4d4d] inline-block"></span>
      <span id="status">starting…</span>
    </div>
    <div class="chip rounded-xl px-3 py-2 text-[#00e0ff] text-xs font-mono font-bold leading-5">
      <div>FPS <span id="fps" class="text-white">0</span></div>
      <div>BODY <span id="poseState" class="text-white">—</span></div>
      <div>BOARD <span id="boardState" class="text-white">—</span></div>
    </div>
  </div>
  <div class="absolute right-3 top-24 flex flex-col gap-3 z-20">
    <button id="btnFlip" class="rbtn w-12 h-12 rounded-full grid place-items-center text-xl text-white">🔄</button>
    <button id="btnSkel" class="rbtn active w-12 h-12 rounded-full grid place-items-center text-xl">🦴</button>
    <button id="btnBoard" class="rbtn active w-12 h-12 rounded-full grid place-items-center text-xl">🛹</button>
  </div>
  <div id="hint" class="absolute bottom-6 left-4 right-4 z-20 chip rounded-2xl px-4 py-3 text-white text-sm font-semibold text-center">Loading…</div>
  <div id="startScreen" class="absolute inset-0 z-40 bg-black flex flex-col items-center justify-center gap-6 px-8 text-center">
    <div class="text-5xl font-extrabold tracking-tight text-white">SHUV<span class="text-[#c6ff00]">.</span></div>
    <p class="text-neutral-400 text-sm leading-relaxed">Combined test: live body skeleton (MediaPipe) + your trained skateboard detector (YOLO). Everything runs on-device.</p>
    <button id="btnStart" class="bg-[#c6ff00] text-black font-bold text-lg px-10 py-4 rounded-2xl border-b-4 border-[#8fb800] active:translate-y-0.5">Start camera</button>
    <p id="errMsg" class="text-[#ff4d4d] text-sm font-semibold"></p>
  </div>
</div>
<script type="module">
import { PoseLandmarker, FilesetResolver, DrawingUtils }
  from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14";

// ====== CONFIG — adjust if needed ======
const MODEL_URL = './best.onnx';
const MODEL_INPUT = 640;
const CONF_THRESHOLD = 0.35;
// ========================================

const video=document.getElementById('cam'), canvas=document.getElementById('overlay'), ctx=canvas.getContext('2d');
const statusEl=document.getElementById('status'), fpsEl=document.getElementById('fps');
const poseEl=document.getElementById('poseState'), boardEl=document.getElementById('boardState');
const hint=document.getElementById('hint');

let landmarker=null, session=null, stream=null, running=false, facing='environment';
let showSkel=true, showBoard=true;
let lastT=performance.now(), frames=0, busy=false;

async function loadModels(){
  statusEl.textContent='loading pose…';
  const vision=await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm");
  landmarker=await PoseLandmarker.createFromOptions(vision,{
    baseOptions:{modelAssetPath:"https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",delegate:"GPU"},
    runningMode:"VIDEO", numPoses:1
  });
  statusEl.textContent='loading board model…';
  session=await ort.InferenceSession.create(MODEL_URL, { executionProviders:['wasm'] });
  statusEl.textContent='LIVE';
}
async function startCam(){
  if(stream) stream.getTracks().forEach(t=>t.stop());
  stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:facing,width:{ideal:1280},height:{ideal:720}},audio:false});
  video.srcObject=stream;
  const mir=facing==='user'; video.classList.toggle('mirror',mir); canvas.classList.toggle('mirror',mir);
  await video.play(); resize();
}
function resize(){canvas.width=video.videoWidth||innerWidth;canvas.height=video.videoHeight||innerHeight;}
addEventListener('resize',resize);

const off=document.createElement('canvas'); off.width=MODEL_INPUT; off.height=MODEL_INPUT;
const offCtx=off.getContext('2d',{willReadFrequently:true});
function preprocess(){
  const vw=video.videoWidth, vh=video.videoHeight;
  const scale=Math.min(MODEL_INPUT/vw, MODEL_INPUT/vh);
  const nw=vw*scale, nh=vh*scale, dx=(MODEL_INPUT-nw)/2, dy=(MODEL_INPUT-nh)/2;
  offCtx.fillStyle='#000'; offCtx.fillRect(0,0,MODEL_INPUT,MODEL_INPUT);
  offCtx.drawImage(video, dx, dy, nw, nh);
  const img=offCtx.getImageData(0,0,MODEL_INPUT,MODEL_INPUT).data;
  const arr=new Float32Array(MODEL_INPUT*MODEL_INPUT*3), area=MODEL_INPUT*MODEL_INPUT;
  for(let i=0;i<area;i++){ arr[i]=img[i*4]/255; arr[i+area]=img[i*4+1]/255; arr[i+area*2]=img[i*4+2]/255; }
  return { tensor:new ort.Tensor('float32', arr, [1,3,MODEL_INPUT,MODEL_INPUT]), scale, dx, dy };
}
function postprocess(output, meta){
  const data=output.data, dims=output.dims;
  const nBoxes=dims[2], nAttrs=dims[1];
  let best=null, bestScore=CONF_THRESHOLD;
  for(let i=0;i<nBoxes;i++){
    const cx=data[0*nBoxes+i], cy=data[1*nBoxes+i], w=data[2*nBoxes+i], h=data[3*nBoxes+i];
    let score=data[4*nBoxes+i];
    for(let c=5;c<nAttrs;c++){ if(data[c*nBoxes+i]>score) score=data[c*nBoxes+i]; }
    if(score>bestScore){ bestScore=score; best={cx,cy,w,h}; }
  }
  if(!best) return null;
  const {scale,dx,dy}=meta;
  return { x:(best.cx-best.w/2-dx)/scale, y:(best.cy-best.h/2-dy)/scale, w:best.w/scale, h:best.h/scale, score:bestScore };
}
async function runBoard(){
  if(busy || !session) return null;
  busy=true;
  try{
    const meta=preprocess();
    const out=await session.run({ [session.inputNames[0]]: meta.tensor });
    return postprocess(out[session.outputNames[0]], meta);
  }catch(e){ console.error('YOLO error',e); return null; }
  finally{ busy=false; }
}
function drawBoard(box){
  if(!box) return;
  const sx=canvas.width/video.videoWidth, sy=canvas.height/video.videoHeight;
  const x=box.x*sx, y=box.y*sy, w=box.w*sx, h=box.h*sy;
  ctx.strokeStyle='#ff2e7e'; ctx.lineWidth=4; ctx.strokeRect(x,y,w,h);
  ctx.fillStyle='#ff2e7e'; ctx.font='bold 20px monospace';
  ctx.fillText('board '+((box.score*100)|0)+'%', x, y-8);
}
let lastBox=null, boardTick=0;
function loop(){
  if(!running) return;
  if(video.readyState>=2 && landmarker){
    const res=landmarker.detectForVideo(video, performance.now());
    ctx.clearRect(0,0,canvas.width,canvas.height);
    if(res.landmarks && res.landmarks.length){
      poseEl.textContent='tracked';
      if(showSkel){
        const du=new DrawingUtils(ctx);
        du.drawConnectors(res.landmarks[0],PoseLandmarker.POSE_CONNECTIONS,{color:'#00e0ff',lineWidth:4});
        du.drawLandmarks(res.landmarks[0],{color:'#c6ff00',radius:4});
      }
    } else { poseEl.textContent='searching'; }
    boardTick++;
    if(boardTick%3===0){ runBoard().then(b=>{ lastBox=b; boardEl.textContent=b?'found':'—'; }); }
    if(showBoard && lastBox) drawBoard(lastBox);
    hint.textContent='Stand 6–8 ft away. Pink box = board, skeleton = you.';
  }
  frames++; const n=performance.now(); if(n-lastT>=1000){ fpsEl.textContent=frames; frames=0; lastT=n; }
  requestAnimationFrame(loop);
}
document.getElementById('btnSkel').onclick=e=>{showSkel=!showSkel;e.currentTarget.classList.toggle('active',showSkel);};
document.getElementById('btnBoard').onclick=e=>{showBoard=!showBoard;e.currentTarget.classList.toggle('active',showBoard);};
document.getElementById('btnFlip').onclick=async()=>{facing=facing==='environment'?'user':'environment';try{await startCam();}catch(e){console.error(e);}};
const btnStart=document.getElementById('btnStart'), startScreen=document.getElementById('startScreen'), errMsg=document.getElementById('errMsg');
btnStart.onclick=async()=>{
  errMsg.textContent='';
  try{
    btnStart.textContent='loading…'; btnStart.disabled=true;
    if(!landmarker||!session) await loadModels();
    await startCam();
    startScreen.style.display='none'; running=true; loop();
  }catch(err){
    console.error(err); btnStart.textContent='Start camera'; btnStart.disabled=false;
    errMsg.textContent = err && err.name==='NotAllowedError'
      ? 'Camera denied. Allow access & reload.'
      : 'Could not start. Make sure best.onnx is in the same folder and you opened this over HTTPS. ('+((err&&err.message)||err)+')';
  }
};
</script>
</body>
</html>
